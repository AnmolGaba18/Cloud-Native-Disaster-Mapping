<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Disaster Management System Login</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef1f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:360px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0px 6px 18px rgba(0,0,0,0.08);
text-align:center;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:5px;
}

.subtitle{
font-size:14px;
color:#777;
margin-bottom:25px;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tab{
flex:1;
padding:10px;
cursor:pointer;
border:none;
background:#eee;
font-weight:600;
}

.tab.active{
background:white;
border-bottom:2px solid #e53935;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.login-btn{
background:#e53935;
color:white;
}

.signup-btn{
background:#2b7cff;
color:white;
}

.hidden{
display:none;
}

.footer{
margin-top:12px;
font-size:13px;
color:#777;
}

</style>
</head>


<body>

<div class="card">

<div class="logo">
Disaster Management System Portal
</div>

<div class="subtitle">
Emergency Services Management System
</div>


<div class="tabs">

<button id="loginTab"
class="tab active"
onclick="showLogin()">
Login
</button>

<button id="signupTab"
class="tab"
onclick="showSignup()">
Sign Up
</button>

</div>



<!-- LOGIN FORM -->

<div id="loginForm">

<input id="loginEmail"
placeholder="Enter your email">

<input id="loginPassword"
type="password"
placeholder="Enter your password">

<button class="login-btn"
onclick="loginUser()">
Sign In
</button>

<div class="footer">
Forgot Password?
</div>

</div>




<!-- SIGNUP FORM -->

<div id="signupForm"
class="hidden">

<input id="firstName"
placeholder="First Name">

<input id="lastName"
placeholder="Last Name">

<input id="signupEmail"
placeholder="Enter your email">

<input id="signupPassword"
type="password"
placeholder="Create password">

<button class="signup-btn"
onclick="signupUser()">
Create Account
</button>

</div>


</div>



<script>

/* TAB SWITCHING */

function showLogin(){

loginForm.classList.remove("hidden");
signupForm.classList.add("hidden");

loginTab.classList.add("active");
signupTab.classList.remove("active");

}


function showSignup(){

signupForm.classList.remove("hidden");
loginForm.classList.add("hidden");

signupTab.classList.add("active");
loginTab.classList.remove("active");

}



/* LOGIN */

function loginUser(){

const email = loginEmail.value.trim();
const password = loginPassword.value.trim();

if(email==="" || password===""){
alert("Enter email and password");
return;
}

fetch("http://localhost:8080/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})
.then(res=>res.json())
.then(user=>{

if(user && user.firstName){

localStorage.setItem("loggedUserName", user.firstName);

localStorage.setItem(
"loggedUserImage",
user.profileImage ? user.profileImage : "default.png"
);

window.location.href="dashboard.html";

}else{

alert("Invalid email or password ❌");

}

})
.catch(()=>alert("Server error during login"));

}



/* SIGNUP */

function signupUser(){

const firstNameVal = firstName.value.trim();
const lastNameVal = lastName.value.trim();
const emailVal = signupEmail.value.trim();
const passwordVal = signupPassword.value.trim();


if(firstNameVal==="" || lastNameVal==="" || emailVal==="" || passwordVal===""){

alert("Please fill all fields");
return;

}


fetch("http://localhost:8080/api/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
firstName:firstNameVal,
lastName:lastNameVal,
email:emailVal,
password:passwordVal,
profileImage:"default.png"
})

})
.then(()=>{

alert("Account created successfully ✅");

showLogin();

})
.catch(()=>alert("Signup failed"));

}

</script>

</body>
</html>
